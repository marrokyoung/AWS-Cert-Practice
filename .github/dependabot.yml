version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
    groups:
      typescript:
        patterns:
          - "typescript"
      node-types:
        patterns:
          - "@types/node"
      eslint-tooling:
        patterns:
          - "eslint"
          - "eslint-config-next"
      frontend-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "typescript"
          - "@types/node"
          - "eslint"
          - "eslint-config-next"

  - package-ecosystem: "cargo"
    directory: "/backend/rust-api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      backend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
